# Local development — MySQL (same env vars as prod).
#
# If startup fails with: Access denied for user 'root'@'localhost' (using password: NO)
# → your MySQL user needs a password. Copy backend/.env.example to backend/.env and set:
#   MYSQL_PASSWORD=your_real_mysql_password
# (Also set MYSQL_USER if you do not use root.) .env is loaded from ./backend/.env or ./.env (see application.properties).
#
# Create the database first, e.g.: CREATE DATABASE bookstore_db;

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/bookstore_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
# MYSQL_* first: an empty Windows env var SPRING_DATASOURCE_PASSWORD would otherwise hide MYSQL_PASSWORD from .env.
spring.datasource.username=${MYSQL_USER:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${MYSQL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# Dev: Hibernate updates tables from entities. Prod uses validate (see application-prod.properties).
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
